<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página en construcción</title>
  <link href="../../output.css" rel="stylesheet">
  <link rel="icon" href="../../assets/favicon.png" type="image/png">
  <link rel="icon" href="../../assets/logo-imagen.svg" type="image/svg+xml">
</head>

<body class="bg-gray-100 text-gray-800 font-sans">

  <!-- Navbar -->
  <nav class="bg-white/70 backdrop-blur-sm shadow sticky top-0 z-50 transition duration-300 ease-in-out">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">

      <div class="grid grid-cols-[auto,1fr] items-center gap-2">
        <a href="/">
          <img src="../../assets/logo-image-katty.svg" alt="JeffAngel Logo Icon" class="h-14 w-auto">
        </a>
        <a href="/" class="hidden md:flex flex-col justify-center">
          <img src="../../assets/logo-text-katty.svg" alt="Katty Portfolio" class="h-8 w-auto mb-1">
          <span class="text-[12px] text-gray-500 leading-none">
            Reclutamiento · Organización · Análisis · Personas
          </span>
        </a>
      </div>

      <div class="space-x-4 text-sm">
        <a href="/" class="text-gray-600 hover:text-blue-600">Portafolio</a>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <main class="max-w-3xl mx-auto px-4 py-16">
    <section class="max-w-2xl w-full bg-white shadow-md rounded-2xl p-8 md:p-12 text-center">

      <!-- Badge -->
      <div class="mb-6">
        <span class="inline-block px-4 py-1 text-sm font-medium text-yellow-700 bg-yellow-100 rounded-full">
          Sitio en progreso
        </span>
      </div>

      <!-- Título -->
      <h1 class="text-3xl md:text-4xl font-bold text-gray-800">
        Página en construcción
      </h1>

      <!-- Texto -->
      <p class="text-gray-600 mt-4 text-lg">
        Estoy trabajando en esta sección para ofrecerte contenido claro, útil y bien estructurado.
      </p>

      <p class="text-gray-500 mt-3">
        Muy pronto estará disponible. Gracias por tu paciencia.
      </p>

<!-- Botón -->
<div class="mt-5 flex justify-center">
  <a href="/"
     class="inline-flex items-center gap-2 px-6 py-3 text-sm font-semibold 
            text-yellow-800 bg-gradient-to-r from-yellow-100 to-yellow-200 
            rounded-full shadow-sm hover:shadow-md 
            hover:scale-105 active:scale-95 
            transition-all duration-300">
    
    <!-- Icono -->
    <svg xmlns="http://www.w3.org/2000/svg" 
         class="w-4 h-4 opacity-80" 
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M15 19l-7-7 7-7" />
    </svg>

    Volver al inicio
  </a>
</div>


    </section>
  </main>

</body>

</html>
